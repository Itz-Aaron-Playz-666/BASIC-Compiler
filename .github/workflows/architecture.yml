name: Upload BASIC Compiler Artifacts

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Define a reusable file list
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: "App-iOS.ipa"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: "App-Android.apk"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: "App-macOS.dmg"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE

      - name: Upload macOS PKG
        uses: actions/upload-artifact@v4
        with:
          name: "App-macOS.pkg"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: "App-Windows.exe"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE

      - name: Upload x64 tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: "App-x64.tar.gz"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE

      - name: Upload x64 zip
        uses: actions/upload-artifact@v4
        with:
          name: "App-x64.zip"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE

      - name: Upload x86 tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: "App-x86.tar.gz"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE

      - name: Upload x86 zip
        uses: actions/upload-artifact@v4
        with:
          name: "App-x86.zip"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            README.md
            LICENSE
