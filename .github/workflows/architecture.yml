name: Upload BASIC Compiler Artifacts

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Mobile formats
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: "App-iOS-IPA"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: "App-Android-APK"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md

      # macOS formats
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: "App-macOS-DMG"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md

      - name: Upload macOS PKG
        uses: actions/upload-artifact@v4
        with:
          name: "App-macOS-PKG"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md

      # Windows format
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: "App-Windows-EXE"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md

      # Cross-platform archives
      - name: Upload x64 tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: "App-x64-tar.gz"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md

      - name: Upload x64 zip
        uses: actions/upload-artifact@v4
        with:
          name: "App-x64-zip"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md

      - name: Upload x86 tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: "App-x86-tar.gz"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md

      - name: Upload x86 zip
        uses: actions/upload-artifact@v4
        with:
          name: "App-x86-zip"
          path: |
            index.html
            compiler.html
            docs.html
            styles.css
            src/**
            docs/**
            LICENSE
            README.md
